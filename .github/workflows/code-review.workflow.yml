name: Claude Code
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC 토큰 발급을 위해 필수
      contents: read     # 코드를 읽기 위해 필수
      pull-requests: write # PR에 댓글을 달거나 수정하려면 필요할 수 있음
      issues: write      # Issue 댓글 반응을 위해 필요
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          # Responds to @claude mentions in comments